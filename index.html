<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ResistorVision PRO - Wide Horizon</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-green: #00e676; 
            --bg-dark: #000000; 
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --glass-bg: rgba(10, 10, 10, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: white; height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        #video-container { position: relative; flex-grow: 1; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        canvas { display: none; }

        /* Dimensiones Invertidas: Ancho (60px) > Alto (40px) */
        .sensor {
            position: absolute; 
            width: 60px;  
            height: 40px; 
            border: 2px solid rgba(0, 230, 118, 0.5); 
            background: rgba(0, 230, 118, 0.1);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 8px; 
            cursor: move; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 100;
            transform: translate(-50%, -50%); 
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .sensor.active { 
            border-color: #fff; 
            box-shadow: 0 0 25px var(--neon-green), inset 0 0 10px rgba(0,230,118,0.5); 
            background: rgba(0, 230, 118, 0.25); 
        }
        .sensor::after { 
            content: attr(data-label); 
            position: absolute; 
            top: -28px; 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--neon-green); 
            text-shadow: 0 0 8px rgba(0,230,118,0.8);
            letter-spacing: 1px;
        }

        .control-panel { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); 
            padding: 25px 25px calc(25px + var(--safe-bottom)) 25px; 
            z-index: 200; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        
        .main-value { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 48px; 
            color: var(--neon-green); 
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
            letter-spacing: -2px;
        }
        
        #tol-val {
            color: #ccc; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 6px 14px; 
            border-radius: 8px; 
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        #debug { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 11px; 
            color: #888; 
            margin-top: 15px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="procCanvas"></canvas>
    
    <div class="sensor" id="s1" data-label="B1" style="top: 50%; left: 26%;"></div>
    <div class="sensor" id="s2" data-label="B2" style="top: 50%; left: 46%;"></div>
    <div class="sensor" id="s3" data-label="MULT" style="top: 50%; left: 60%;"></div>
    <div class="sensor" id="s4" data-label="TOL" style="top: 50%; left: 73%;"></div>
</div>

<div class="control-panel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div class="main-value" id="res-val">--- Ω</div>
        <div id="tol-val">± --%</div>
    </div>
    <div id="debug">Modo: Gran Cobertura Lateral (60x40px)</div>
</div>

<script type="module">
    import { Haptics, ImpactStyle } from '@capacitor/haptics';

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('procCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let activeSensor = null;
    let lastValueRead = null;

    const COLOR_MAP = [
        { name: "NEGRO", val: 0, mult: 1, rgb: [25,25,25] },
        { name: "MARRON", val: 1, mult: 10, rgb: [85,55,45] },
        { name: "ROJO", val: 2, mult: 100, rgb: [180,40,40] },
        { name: "NARANJA", val: 3, mult: 1000, rgb: [220,110,30] },
        { name: "AMARILLO", val: 4, mult: 10000, rgb: [240,210,50] },
        { name: "VERDE", val: 5, mult: 100000, rgb: [40,160,60] },
        { name: "AZUL", val: 6, mult: 1000000, rgb: [40,80,180] },
        { name: "VIOLETA", val: 7, mult: 10000000, rgb: [120,60,160] },
        { name: "GRIS", val: 8, mult: 100000000, rgb: [130,130,130] },
        { name: "BLANCO", val: 9, mult: 1000000000, rgb: [230,230,230] },
        { name: "ORO", val: null, mult: 0.1, tol: 5, rgb: [180,150,70] },
        { name: "PLATA", val: null, mult: 0.01, tol: 10, rgb: [170,170,170] }
    ];

    async function triggerHaptic(style = ImpactStyle.Light) {
        try {
            await Haptics.impact({ style });
        } catch(e) {
            // Fallback for web if needed
            if(navigator.vibrate) navigator.vibrate(10);
        }
    }

    document.querySelectorAll('.sensor').forEach(el => {
        el.onpointerdown = (e) => {
            activeSensor = el;
            document.querySelectorAll('.sensor').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            el.setPointerCapture(e.pointerId);
            triggerHaptic(ImpactStyle.Medium);
        };
        el.onpointermove = (e) => {
            if (activeSensor !== el) return;
            const c = document.getElementById('video-container').getBoundingClientRect();
            el.style.left = `${((e.clientX - c.left) / c.width) * 100}%`;
            el.style.top = `${((e.clientY - c.top) / c.height) * 100}%`;
        };
        el.onpointerup = () => {
            activeSensor = null;
            el.classList.remove('active');
            triggerHaptic(ImpactStyle.Light);
        };
    });

    async function init() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = s;
            video.onloadedmetadata = () => { video.play(); process(); };
        } catch (error) {
            console.error("Camera access denied or unavailable", error);
            document.getElementById('debug').innerText = "ERROR AL ACCEDER A LA CÁMARA";
        }
    }

    function process() {
        if (!video.videoWidth) { requestAnimationFrame(process); return; }
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const data = ['s1', 's2', 's3', 's4'].map(id => {
            const el = document.getElementById(id);
            const r = el.getBoundingClientRect();
            const c = document.getElementById('video-container').getBoundingClientRect();
            
            // Precise center sampling
            const x = Math.floor(((r.left + (r.width/2) - c.left) / c.width) * canvas.width);
            const y = Math.floor(((r.top + (r.height/2) - c.top) / c.height) * canvas.height);
            
            const p = ctx.getImageData(x-3, y-3, 7, 7).data;
            let rgb = [0,0,0];
            for(let i=0; i<p.length; i+=4){ rgb[0]+=p[i]; rgb[1]+=p[i+1]; rgb[2]+=p[i+2]; }
            return getClosestColor(rgb[0]/49, rgb[1]/49, rgb[2]/49);
        });

        if (data[0].val !== null && data[1].val !== null) {
            let val = (data[0].val * 10 + data[1].val) * data[2].mult;
            let displayVal = val >= 1000000 ? (val/1000000).toFixed(1) + " MΩ" : 
                            val >= 1000 ? (val/1000).toFixed(1) + " kΩ" : 
                            val.toFixed(0) + " Ω";
            
            document.getElementById('res-val').innerText = displayVal;
            document.getElementById('tol-val').innerText = "± " + (data[3].tol || 5) + "%";
            document.getElementById('debug').innerText = `B1:${data[0].name} | B2:${data[1].name} | MULT:${data[2].name}`;
            
            if (lastValueRead !== val && typeof val === 'number') {
                lastValueRead = val;
                // Subtle feedback on value change
            }
        }
        setTimeout(process, 120);
    }

    function getClosestColor(r, g, b) {
        let min = Infinity; let cl = COLOR_MAP[0];
        COLOR_MAP.forEach(c => {
            const d = Math.sqrt(Math.pow(r-c.rgb[0],2) + Math.pow(g-c.rgb[1],2) + Math.pow(b-c.rgb[2],2));
            if(d < min) { min = d; cl = c; }
        });
        return cl;
    }
    
    // Start only when DOM is loaded
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
